<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Import Library Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; overflow: hidden; background-color: #1a1a1a; color: white; }

        .container {
            height: 400vh;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        /* Halaman 1 */
        #page1 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        h1 { font-family: 'Dancing Script', cursive; font-size: 4.5rem; margin-bottom: 25px; }

        .btn-open {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: white;
            color: #f5576c;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-open:hover { transform: scale(1.05); }

        /* Halaman 2 */
        #page2 { background: #ffffff; color: #333; }
        .message-box { max-width: 600px; line-height: 1.8; font-size: 1.1rem; padding: 20px; }

        /* Halaman 3 - Warna Lebih Muda */
        #page3 { background: linear-gradient(135deg, #fce4ff 0%, #ffd1d7 100%); color: #f5576c; }

        /* Icon Swipe Up & Animasi */
        .swipe-icon {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            cursor: pointer;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
            40% { transform: translate(-50%, -15px); }
            60% { transform: translate(-50%, -7px); }
        }

        .hidden { opacity: 0; transform: translateY(20px); transition: 1s all ease; }
        .show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <!-- HALAMAN 1 -->
        <section id="page1">
            <h1 class="hidden">Happy Birthday</h1>
            <button class="btn-open" onclick="nextPage(1)">Open</button>
        </section>

        <!-- HALAMAN 2 -->
        <section id="page2">
            <div class="message-box">
                <h2>Dear Someone,</h2>
                <br>
                <p>Ini adalah halaman kedua. Kamu bisa mengisi teks ungkapan perasaan atau harapan terbaikmu di sini. Tampilannya bersih agar pesanmu lebih mudah menyentuh hati.</p>
                <br>
                <p>Swipe up untuk lanjut!</p>
            </div>
            <div class="swipe-icon" onclick="nextPage(2)" style="color: #f5576c;">
                <i class="fa-solid fa-angles-up"></i>
                <p style="font-size: 0.8rem; margin-top: 5px;">Swipe Up</p>
            </div>
        </section>

        <!-- HALAMAN 3 -->
        <section id="page3">
            <!-- Halaman Kosong Warna Muda -->
            <div class="swipe-icon" onclick="nextPage(3)" style="color: #f5576c;">
                <i class="fa-solid fa-angles-up"></i>
                <p style="font-size: 0.8rem; margin-top: 5px;">Swipe Up</p>
            </div>
        </section>

        <!-- HALAMAN 4 (Blank) -->
        <section id="page4" style="background: white;"></section>
    </div>

    <script>
        // Fungsi Confetti
        function shootConfetti() {
            var duration = 5 * 1000; // Durasi confetti 5 detik
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.6 },
                    colors: ['#ffffff', '#f5576c', '#f093fb']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.6 },
                    colors: ['#ffffff', '#f5576c', '#f093fb']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Jalankan saat halaman pertama kali dibuka/reload
        window.onload = () => {
            // Munculkan teks
            document.querySelector('#page1 h1').classList.add('show');
            // Langsung nyalakan confetti
            shootConfetti();
        };

        function nextPage(currentPage) {
            const container = document.getElementById('mainContainer');
            container.style.transform = `translateY(-${currentPage * 100}vh)`;
        }

        // Support swipe gesture sederhana
        let touchstartY = 0;
        let touchendY = 0;

        document.addEventListener('touchstart', e => { touchstartY = e.changedTouches[0].screenY; });
        document.addEventListener('touchend', e => { 
            touchendY = e.changedTouches[0].screenY;
            handleGesture();
        });

        function handleGesture() {
            if (touchstartY - touchendY > 100) { 
                // Logika swipe sederhana untuk pindah antar halaman
                const container = document.getElementById('mainContainer');
                const currentTransform = container.style.transform || "translateY(0vh)";
                const currentY = parseInt(currentTransform.replace(/[^\d.-]/g, '')) || 0;
                
                if (currentY > -300) { // Batasi sampai halaman terakhir
                    container.style.transform = `translateY(${currentY - 100}vh)`;
                }
            }
        }
    </script>
</body>
</html>
